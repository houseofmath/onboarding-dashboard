/* ── data grouping ── */
function buildGroupData(data,co,rg,cg){
  const f=data.filter(d=>d.co===co&&d.rg===rg&&d.cg===cg);
  return STEPS.map(s=>{
    const rows=f.filter(d=>d.so===s.o);
    if(!rows.length)return{...s,responses:[],subQuestions:[],totalEntities:0,question:""};
    const question=rows[0].q;const ste=rows[0].ste;
    if(s.t==="composite_yesno"){
      const sqMap={};
      rows.forEach(r=>{
        if(!r.sq||r.sq.startsWith("us-onboarding"))return;
        if(!sqMap[r.sq])sqMap[r.sq]={rows:[],ste:r.ste};
        sqMap[r.sq].rows.push({value:r.rv,count:r.ec,pct:r.pct});
      });
      const subQuestions=Object.entries(sqMap).map(([sq,d])=>({question:sq,responses:d.rows.sort((a,b)=>b.count-a.count),total:d.ste}));
      return{...s,question,subQuestions,responses:[],totalEntities:subQuestions[0]?.total||0};
    }
    const rs=rows.map(r=>({value:r.rv,count:r.ec,pct:r.pct})).sort((a,b)=>b.count-a.count);
    return{...s,question,responses:rs,subQuestions:[],totalEntities:ste};
  });
}

function CompositeChart({subQuestions,color,compact=false}){
  return <div style={{display:"flex",flexDirection:"column",gap:compact?5:9}}>
    {subQuestions.map((sq,i)=>{
      const yes=sq.responses.find(r=>r.value==="Yes");
      const yesPct=yes&&sq.total>0?(yes.count/sq.total*100):0;
      return <div key={i}>
        <div style={{fontSize:compact?10.5:11.5,fontWeight:500,marginBottom:4,color:"#475569",lineHeight:1.4}}>{sq.question}</div>
        <div style={{display:"flex",height:compact?18:24,borderRadius:4,overflow:"hidden",background:"#E2E8F0"}}>
          <div style={{width:`${yesPct}%`,background:color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:compact?9.5:10.5,fontWeight:700,color:"white",minWidth:yesPct>12?32:0}}>{yesPct>12?`${yesPct.toFixed(0)}%`:""}</div>
        </div>
      </div>;
    })}
  </div>;
}

function StepChart({step,color,compact=false}){
  if(!step||(!step.responses.length&&!step.subQuestions.length))return <div style={{color:"#64748B",fontSize:11}}>No data</div>;
  if(step.t==="composite_yesno"&&step.subQuestions.length>0)return <CompositeChart subQuestions={step.subQuestions} color={color} compact={compact}/>;
  return <BarChart responses={step.responses} totalEntities={step.totalEntities} color={color} compact={compact}/>;
}

/* ── Likert stacked bar for "all" view ── */
function LikertStacked({responses,totalEntities,color}){
  const ordered=LIK.map(l=>responses.find(r=>r.value===l)||{value:l,count:0,pct:0});
  const total=totalEntities||1;
  return <div>
    <div style={{height:28,display:"flex",borderRadius:5,overflow:"hidden",marginBottom:10}}>
      {ordered.map(r=>{const w=r.count/total*100;return <div key={r.value} style={{width:`${w}%`,background:LC[r.value],display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"white",minWidth:r.count>0?2:0}}>{w>10?`${w.toFixed(0)}%`:""}</div>})}
    </div>
    {ordered.map(r=>(<div key={r.value} style={{display:"grid",gridTemplateColumns:"132px 1fr 40px 42px",alignItems:"center",gap:5,marginBottom:4}}>
      <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:9,height:9,borderRadius:2,background:LC[r.value],flexShrink:0}}/><span style={{fontSize:11.5,fontWeight:500,color:"#334155"}}>{r.value}</span></div>
      <div style={{height:11,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${(r.count/Math.max(...ordered.map(x=>x.count),1)*100)}%`,background:LC[r.value],borderRadius:3}}/></div>
      <span style={{fontSize:10.5,fontWeight:700,textAlign:"right",fontFamily:"monospace",color:"#334155"}}>{r.count}</span>
      <span style={{fontSize:10.5,fontWeight:700,textAlign:"right",fontFamily:"monospace",color}}>{(r.count/total*100).toFixed(0)}%</span>
    </div>))}
    <div style={{marginTop:8,padding:"5px 9px",background:"#F8FAFC",borderRadius:4,fontSize:10,color:"#64748B"}}>
      Positive: <span style={{fontWeight:700,color}}>{((ordered[2].count+ordered[3].count)/total*100).toFixed(1)}%</span> · {total} entities
    </div>
  </div>;
}

/* ── Full detail chart for "all" view ── */
function FullStepChart({step,color}){
  if(!step||(!step.responses.length&&!step.subQuestions.length))return <div style={{color:"#64748B",fontSize:11}}>No data</div>;
  if(step.t==="composite_yesno"&&step.subQuestions.length>0){
    return <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {step.subQuestions.map((sq,i)=>{
        const yes=sq.responses.find(r=>r.value==="Yes");
        const no=sq.responses.find(r=>r.value==="No");
        const yesPct=yes&&sq.total>0?(yes.count/sq.total*100):0;
        const noPct=no&&sq.total>0?(no.count/sq.total*100):0;
        return <div key={i}>
          <div style={{fontSize:11.5,fontWeight:600,marginBottom:4,color:"#475569",lineHeight:1.35}}>{sq.question}</div>
          <div style={{display:"flex",height:25,borderRadius:5,overflow:"hidden"}}>
            <div style={{width:`${yesPct}%`,background:"#059669",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"white",minWidth:yesPct>8?30:0}}>{yesPct>8?`Yes ${yesPct.toFixed(0)}%`:""}</div>
            <div style={{width:`${noPct}%`,background:"#EF4444",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"white",minWidth:noPct>8?30:0}}>{noPct>8?`No ${noPct.toFixed(0)}%`:""}</div>
            {(100-yesPct-noPct)>1&&<div style={{width:`${100-yesPct-noPct}%`,background:"#E2E8F0"}}/>}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#475569",marginTop:2}}>
            <span>Yes: {yes?.count||0}</span><span>Total: {sq.total}</span><span>No: {no?.count||0}</span>
          </div>
        </div>;
      })}
    </div>;
  }
  if(isLik(step.responses.map(r=>r.value)))return <LikertStacked responses={step.responses} totalEntities={step.totalEntities} color={color}/>;
  // Categorical
  const items=step.responses.slice(0,12);
  const mx=Math.max(...items.map(r=>r.count),1);
  return <div>
    <div style={{height:24,display:"flex",borderRadius:5,overflow:"hidden",marginBottom:10}}>
      {items.map((r,i)=>{const w=r.count/(step.totalEntities||1)*100;return <div key={r.value+i} style={{width:`${w}%`,background:PAL[i%PAL.length],minWidth:r.count>0?2:0}}/>})}
    </div>
    {items.map((r,i)=>(<div key={r.value+i} style={{display:"grid",gridTemplateColumns:"1fr 92px 40px 42px",alignItems:"center",gap:5,marginBottom:4}}>
      <div style={{display:"flex",alignItems:"center",gap:5,overflow:"hidden"}}><div style={{width:9,height:9,borderRadius:2,background:PAL[i%PAL.length],flexShrink:0}}/><span style={{fontSize:11.5,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:"#334155"}}>{r.value}</span></div>
      <div style={{height:11,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${(r.count/mx*100)}%`,background:PAL[i%PAL.length],borderRadius:3}}/></div>
      <span style={{fontSize:10.5,fontWeight:700,textAlign:"right",fontFamily:"monospace",color:"#334155"}}>{r.count}</span>
      <span style={{fontSize:10.5,fontWeight:700,textAlign:"right",fontFamily:"monospace",color}}>{r.pct.toFixed(0)}%</span>
    </div>))}
    {step.responses.length>12&&<div style={{fontSize:9,color:"#475569",marginTop:4}}>+{step.responses.length-12} more</div>}
    <div style={{marginTop:6,fontSize:10,color:"#475569"}}>{step.totalEntities} entities{step.t==="multi_select"?" · multi-select (may exceed 100%)":""}</div>
  </div>;
}

/* ══════════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════════ */
function App(){
  const data=useMemo(()=>decode(),[]);
  const[co,setCo]=useState("NO");
  const[ro,setRo]=useState("Student");
  const[sel,setSel]=useState(null);
  const[mode,setMode]=useState("conversion"); // "conversion" | "all" | "compare"

  // Build data for all groups
  const convData=useMemo(()=>buildGroupData(data,co,ro,"converter"),[data,co,ro]);
  const regData=useMemo(()=>buildGroupData(data,co,ro,"non_converter_reg"),[data,co,ro]);
  const unregData=useMemo(()=>buildGroupData(data,co,ro,"non_converter_unreg"),[data,co,ro]);
  const allData=useMemo(()=>buildGroupData(data,co,ro,"all"),[data,co,ro]);

  // For "compare" mode: other country
  const otherCo=co==="NO"?"US":"NO";
  const allDataOther=useMemo(()=>buildGroupData(data,otherCo,ro,"all"),[data,otherCo,ro]);

  const activeConv=sel!==null?convData.find(s=>s.o===sel):null;
  const activeReg=sel!==null?regData.find(s=>s.o===sel):null;
  const activeUnreg=sel!==null?unregData.find(s=>s.o===sel):null;
  const activeAll=sel!==null?allData.find(s=>s.o===sel):null;
  const activeAllOther=sel!==null?allDataOther.find(s=>s.o===sel):null;

  const convStart=convData[0]?.totalEntities||0;
  const regStart=regData[0]?.totalEntities||0;
  const unregStart=unregData[0]?.totalEntities||0;
  const totalStart=allData[0]?.totalEntities||0;
  const convRate=totalStart>0?(convStart/totalStart*100):0;

  // Key divergences
  const insights=useMemo(()=>{
    const results=[];
    STEPS.forEach(s=>{
      const cv=convData.find(d=>d.o===s.o);
      const nv=unregData.find(d=>d.o===s.o);
      if(!cv||!nv||cv.t==="composite_yesno")return;
      const isL=isLik(cv.responses.map(r=>r.value));
      if(isL){
        const cvPos=(cv.responses.filter(r=>r.value==="Agree"||r.value==="Strongly Agree").reduce((a,r)=>a+r.count,0))/(cv.totalEntities||1)*100;
        const nvPos=(nv.responses.filter(r=>r.value==="Agree"||r.value==="Strongly Agree").reduce((a,r)=>a+r.count,0))/(nv.totalEntities||1)*100;
        const diff=cvPos-nvPos;
        if(Math.abs(diff)>5)results.push({step:s,diff,cvPct:cvPos,nvPct:nvPos,metric:"positive %"});
      }else if(cv.responses.length>0&&nv.responses.length>0){
        const topCv=cv.responses[0];
        const topNvMatch=nv.responses.find(r=>r.value===topCv.value);
        const cvPct=topCv.count/(cv.totalEntities||1)*100;
        const nvPct=topNvMatch?(topNvMatch.count/(nv.totalEntities||1)*100):0;
        const diff=cvPct-nvPct;
        if(Math.abs(diff)>8)results.push({step:s,diff,cvPct,nvPct,metric:`"${topCv.value}"`});
      }
    });
    return results.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).slice(0,6);
  },[convData,unregData]);

  /* ── Funnel list (shared across modes) ── */
  function renderFunnel(){
    const showCols=mode==="conversion";
    return <div style={{background:"#FFFFFF",borderRadius:10,padding:14,border:"1px solid #E2E8F0",boxShadow:"0 1px 2px rgba(15,23,42,0.04)",overflow:"auto",maxHeight:"72vh"}}>
      <div style={{fontSize:14,fontWeight:700,marginBottom:10,color:"#0F172A"}}>Funnel Steps</div>
      {STEPS.map((s)=>{
        const cv=convData.find(d=>d.o===s.o);
        const rv=regData.find(d=>d.o===s.o);
        const uv=unregData.find(d=>d.o===s.o);
        const av=allData.find(d=>d.o===s.o);
        const isActive=sel===s.o;
        if(showCols){
          return <div key={s.o} onClick={()=>setSel(prev=>prev===s.o?null:s.o)} style={{
            display:"grid",gridTemplateColumns:"minmax(0,1fr) 38px 44px 54px",alignItems:"center",gap:3,
            padding:"5px 5px",borderRadius:6,cursor:"pointer",marginBottom:2,
            background:isActive?"#E2E8F0":"transparent",
            border:isActive?"1px solid #CBD5E1":"1px solid transparent"
          }}>
            <div style={{minWidth:0}}><div style={{display:"flex",alignItems:"flex-start",gap:5,minWidth:0}}>
              <span style={{fontSize:11.25,fontWeight:600,color:"#0F172A",lineHeight:1.2,whiteSpace:"normal",overflow:"visible",display:"block",minWidth:0,flex:1,wordBreak:"break-word"}} title={s.l}>{s.l}</span>
              <TypeBadge type={s.t} small/>
            </div></div>
            <div style={{fontSize:9.5,fontWeight:700,textAlign:"right",color:"#10B981",fontFamily:"monospace"}}>{cv?.totalEntities||0}</div>
            <div style={{fontSize:9.5,fontWeight:700,textAlign:"right",color:"#F59E0B",fontFamily:"monospace"}}>{rv?.totalEntities||0}</div>
            <div style={{fontSize:9.5,fontWeight:700,textAlign:"right",color:"#EF4444",fontFamily:"monospace"}}>{uv?.totalEntities||0}</div>
          </div>;
        }
        // all or compare mode
        const mainV=av?.totalEntities||0;
        const maxV=allData[0]?.totalEntities||1;
        const pct=mainV/maxV*100;
        return <div key={s.o} onClick={()=>setSel(prev=>prev===s.o?null:s.o)} style={{
          display:"grid",gridTemplateColumns:"minmax(0,1fr) 74px 42px",alignItems:"center",gap:5,
          padding:"5px 5px",borderRadius:6,cursor:"pointer",marginBottom:2,
          background:isActive?"#E2E8F0":"transparent",
          border:isActive?"1px solid #CBD5E1":"1px solid transparent"
        }}>
          <div style={{minWidth:0}}><div style={{display:"flex",alignItems:"flex-start",gap:5,minWidth:0}}>
            <span style={{fontSize:11.25,fontWeight:600,color:"#0F172A",lineHeight:1.2,whiteSpace:"normal",overflow:"visible",display:"block",minWidth:0,flex:1,wordBreak:"break-word"}} title={s.l}>{s.l}</span>
            <TypeBadge type={s.t} small/>
          </div></div>
          <div style={{height:10,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,borderRadius:3,background:CG_META.all.g}}/></div>
          <div style={{fontSize:9.5,fontWeight:700,textAlign:"right",color:"#60A5FA",fontFamily:"monospace"}}>{mainV}</div>
        </div>;
      })}
      <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #E2E8F0",display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
        {showCols&&<><span style={{fontSize:9.5,color:"#64748B",fontWeight:600}}>Counts:</span><span style={{fontSize:9,color:"#10B981",fontWeight:700}}>Sub</span><span style={{fontSize:9,color:"#F59E0B",fontWeight:700}}>Signed</span><span style={{fontSize:9,color:"#EF4444",fontWeight:700}}>Not signed</span><span style={{width:1,height:12,background:"#E2E8F0"}}/></>}
        <span style={{fontSize:9.5,color:"#64748B",fontWeight:600}}>Type:</span><span style={{fontSize:9,color:"#334155",fontWeight:700}}>M = MULTI</span><span style={{fontSize:9,color:"#334155",fontWeight:700}}>S = SINGLE</span><span style={{fontSize:9,color:"#334155",fontWeight:700}}>Y/N = YES/NO</span>
      </div>
    </div>;
  }

  /* ── Detail panels per mode ── */
  function renderDetail(){
    if(sel===null){
      // Landing panels
      if(mode==="conversion"){
        return <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {/* Retention */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{background:"#FFFFFF",borderRadius:10,padding:14,border:"1px solid #E2E8F0",boxShadow:"0 1px 2px rgba(15,23,42,0.04)"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:8}}>Retention Curves (% of step 1)</div>
              <div style={{position:"relative",height:200}}>
                {["converter","non_converter_reg","non_converter_unreg"].map((cg)=>{
                  const gd=cg==="converter"?convData:cg==="non_converter_reg"?regData:unregData;
                  const start=gd[0]?.totalEntities||1;
                  const meta=CG_META[cg];
                  const points=gd.map((s,i)=>({x:i/(gd.length-1)*100,y:100-s.totalEntities/start*100}));
                  const path=points.map((p,i)=>i===0?`M ${p.x} ${p.y}`:`L ${p.x} ${p.y}`).join(" ");
                  return <svg key={cg} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%"}} viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d={path} fill="none" stroke={meta.c} strokeWidth="0.8" opacity="0.8"/>
                  </svg>;
                })}
                {[0,25,50,75,100].map(v=><div key={v} style={{position:"absolute",left:0,top:`${v}%`,fontSize:7,color:"#475569",transform:"translateY(-50%)"}}>{100-v}%</div>)}
              </div>
              <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:6}}>
                {["converter","non_converter_reg","non_converter_unreg"].map(k=><div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
                  <div style={{width:10,height:3,borderRadius:2,background:CG_META[k].c}}/>
                  <span style={{fontSize:8,color:"#475569"}}>{CG_META[k].l}</span>
                </div>)}
              </div>
            </div>
            <div style={{background:"#FFFFFF",borderRadius:10,padding:14,border:"1px solid #E2E8F0",boxShadow:"0 1px 2px rgba(15,23,42,0.04)"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:8}}>Top Divergences: Subscribers vs Not Signed Up</div>
              {insights.length===0?<div style={{color:"#64748B",fontSize:11}}>Not enough data</div>:
              insights.map((ins,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:i<insights.length-1?"1px solid #E2E8F0":"none",cursor:"pointer"}} onClick={()=>setSel(ins.step.o)}>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,fontWeight:600,color:"#334155"}}>{ins.step.l}</div>
                  <div style={{fontSize:8,color:"#64748B"}}>{ins.metric}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#10B981",fontFamily:"monospace"}}>{ins.cvPct.toFixed(0)}%</span>
                  <span style={{fontSize:10,fontWeight:700,color:ins.diff>0?"#10B981":"#EF4444",fontFamily:"monospace"}}>{ins.diff>0?"▲":"▼"}{Math.abs(ins.diff).toFixed(0)}pp</span>
                  <span style={{fontSize:11,fontWeight:700,color:"#EF4444",fontFamily:"monospace"}}>{ins.nvPct.toFixed(0)}%</span>
                </div>
              </div>)}
            </div>
          </div>
          <div style={{background:"#F8FAFC",borderRadius:10,padding:16,border:"1px dashed #CBD5E1",textAlign:"center",color:"#334155",fontSize:15,fontWeight:700,lineHeight:1.45}}>
            ← Click a step to compare subscribers, signed-up users, and not-signed-up users
          </div>
        </div>;
      }
      // all or compare landing
      return <div style={{background:"#F8FAFC",borderRadius:10,padding:32,border:"1px dashed #CBD5E1",display:"flex",alignItems:"center",justifyContent:"center",minHeight:300}}>
        <div style={{textAlign:"center",color:"#334155"}}><div style={{fontSize:34,fontWeight:700,marginBottom:6}}>←</div>
        <div style={{fontSize:17,fontWeight:700,lineHeight:1.45}}>{mode==="all"?"Click a step to see the full response distribution":"Click a step to compare NO vs US"}</div></div>
      </div>;
    }

    // Step selected
    if(mode==="conversion"){
      return <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{background:"#FFFFFF",borderRadius:10,padding:16,border:"1px solid #E2E8F0",boxShadow:"0 1px 2px rgba(15,23,42,0.04)"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
            <span style={{fontSize:17,fontWeight:700,color:"#0F172A"}}>{activeConv?.l||"Step"}</span>
            <TypeBadge type={activeConv?.t||"single_select"} full/>
            <span style={{fontSize:10,color:"#475569"}}>Step #{sel}</span>
          </div>
          {activeConv?.question&&<div style={{fontSize:13,color:"#475569",fontWeight:500,padding:"9px 13px",background:"#F8FAFC",borderRadius:6,borderLeft:"3px solid #10B981",marginBottom:12,lineHeight:1.45}}>"{activeConv.question}"</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>
            {[["converter",activeConv,CG_META.converter],["non_converter_reg",activeReg,CG_META.non_converter_reg],["non_converter_unreg",activeUnreg,CG_META.non_converter_unreg]].map(([key,step,meta])=><div key={key}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:meta.c}}/>
                <span style={{fontSize:13,fontWeight:700,color:meta.c}}>{meta.l}</span>
                <span style={{fontSize:10,color:"#475569"}}>{step?.totalEntities||0}</span>
              </div>
              <StepChart step={step} color={meta.c}/>
            </div>)}
          </div>
        </div>
        {insights.length>0&&<div style={{background:"#FFFFFF",borderRadius:10,padding:14,border:"1px solid #E2E8F0",boxShadow:"0 1px 2px rgba(15,23,42,0.04)"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:8}}>Key Divergences: Subscribers vs Not Signed Up</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {insights.map((ins,i)=><div key={i} style={{background:"#F8FAFC",borderRadius:6,padding:"8px 10px",border:"1px solid #E2E8F0",cursor:"pointer"}} onClick={()=>setSel(ins.step.o)}>
              <div style={{fontSize:9,fontWeight:600,color:"#334155",marginBottom:3}}>{ins.step.l}</div>
              <div style={{fontSize:8,color:"#64748B",marginBottom:4}}>{ins.metric}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                <span style={{fontSize:10,fontWeight:700,color:"#10B981"}}>{ins.cvPct.toFixed(0)}%</span>
                <span style={{fontSize:9,fontWeight:700,color:ins.diff>0?"#10B981":"#EF4444"}}>{ins.diff>0?"+":""}{ins.diff.toFixed(0)}pp</span>
                <span style={{fontSize:10,fontWeight:700,color:"#EF4444"}}>{ins.nvPct.toFixed(0)}%</span>
              </div>
            </div>)}
          </div>
        </div>}
      </div>;
    }

    if(mode==="all"){
      return <div style={{background:"#FFFFFF",borderRadius:10,padding:16,border:"1px solid #E2E8F0",boxShadow:"0 1px 2px rgba(15,23,42,0.04)",overflow:"auto",maxHeight:"72vh"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
          <span style={{fontSize:17,fontWeight:700,color:"#0F172A"}}>{activeAll?.l||"Step"}</span>
          <TypeBadge type={activeAll?.t||"single_select"} full/>
          <span style={{fontSize:10,color:"#475569"}}>Step #{sel}</span>
          <span style={{fontSize:10,color:"#475569"}}>· {activeAll?.totalEntities||0} entities</span>
        </div>
        {activeAll?.question&&<div style={{fontSize:13,color:"#3B82F6",fontWeight:500,padding:"9px 13px",background:"#EFF6FF",borderRadius:6,borderLeft:"3px solid #3B82F6",marginBottom:12,lineHeight:1.45}}>"{activeAll.question}"</div>}
        <FullStepChart step={activeAll} color="#60A5FA"/>
        <div style={{marginTop:12,padding:"6px 9px",background:"#F8FAFC",borderRadius:5,fontSize:9,color:"#64748B",lineHeight:1.4}}>
          Canonical entity-level (deduplicated). Switch to <strong style={{color:"#10B981",cursor:"pointer"}} onClick={()=>setMode("conversion")}>Subscriber view</strong> to see the subscriber vs non-subscriber breakdown.
        </div>
      </div>;
    }

    // compare mode
    return <div style={{background:"#FFFFFF",borderRadius:10,padding:16,border:"1px solid #E2E8F0",boxShadow:"0 1px 2px rgba(15,23,42,0.04)",overflow:"auto",maxHeight:"72vh"}}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
        <span style={{fontSize:17,fontWeight:700,color:"#0F172A"}}>{activeAll?.l||"Step"}</span>
        <TypeBadge type={activeAll?.t||"single_select"} full/>
        <span style={{fontSize:10,color:"#475569"}}>Step #{sel}</span>
      </div>
      {activeAll?.question&&activeAllOther?.question&&activeAll.question===activeAllOther.question?(
        <div style={{fontSize:13,color:"#3B82F6",fontWeight:500,padding:"9px 13px",background:"#EFF6FF",borderRadius:6,borderLeft:"3px solid #3B82F6",marginBottom:12,lineHeight:1.45}}>"{activeAll.question}"</div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          {[[co,activeAll],[otherCo,activeAllOther]].map(([c,step])=>step?.question&&<div key={c} style={{fontSize:12,color:"#60A5FA",fontWeight:500,padding:"7px 10px",background:"#EFF6FF",borderRadius:5,borderLeft:"3px solid #3B82F6",lineHeight:1.4}}>{c==="NO"?"🇳🇴":"🇺🇸"} "{step.question}"</div>)}
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {[[co,activeAll],[otherCo,activeAllOther]].map(([c,step])=><div key={c}>
          <div style={{fontSize:14.5,fontWeight:700,marginBottom:10,color:"#0F172A"}}>{c==="NO"?"🇳🇴 Norway":"🇺🇸 US"} <span style={{fontWeight:400,color:"#475569",fontSize:12.5}}>{step?.totalEntities||0} entities</span></div>
          <StepChart step={step} color={c===co?"#60A5FA":"#F472B6"} compact/>
        </div>)}
      </div>
    </div>;
  }

  return <div style={{minHeight:"100vh"}}>
    {/* Header */}
    <div style={{background:"linear-gradient(135deg,#FFFFFF 0%,#F8FAFC 100%)",padding:"16px 20px",borderBottom:"1px solid #E2E8F0"}}>
      <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.15em",color:"#10B981",marginBottom:2}}>Onboarding · Longitudinal + Distribution Analysis (Canonical Entity)</div>
      <div style={{fontSize:20,fontWeight:700,color:"#0F172A"}}>Onboarding Response Dashboard</div>
      <div style={{fontSize:11.5,color:"#64748B",marginTop:3}}>Campaign: Feb 10 – Mar 31, 2026 · Canonical entity deduplication (user › email › visitor › session)</div>
    </div>

    {/* Filters */}
    <div style={{padding:"8px 20px",background:"#FFFFFF",borderBottom:"1px solid #E2E8F0",display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <span style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:".06em",marginRight:2}}>Country</span>
        {[["NO","🇳🇴 Norway"],["US","🇺🇸 US"]].map(([k,v])=><Pill key={k} active={co===k} color="#60A5FA" onClick={()=>{setCo(k);setSel(null)}}>{v}</Pill>)}
      </div>
      <div style={{width:1,height:20,background:"#E2E8F0"}}/>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <span style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:".06em",marginRight:2}}>Role</span>
        {["Student","Parent","Teacher","Other"].map(r=><Pill key={r} active={ro===r} color="#A78BFA" onClick={()=>{setRo(r);setSel(null)}}>{r}</Pill>)}
      </div>
      <div style={{width:1,height:20,background:"#E2E8F0"}}/>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <span style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:".06em",marginRight:2}}>View</span>
        {[["conversion","Subscriber Analysis"],["all","All Users"],["compare","NO vs US"]].map(([k,l])=>
          <Pill key={k} active={mode===k} color={k==="conversion"?"#10B981":k==="all"?"#60A5FA":"#F472B6"} onClick={()=>{setMode(k);setSel(null)}}>{l}</Pill>
        )}
      </div>
    </div>

    {/* Summary Cards */}
    <div style={{padding:"12px 20px",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
      {[
        {l:"Total Entities",v:totalStart,c:"#60A5FA",sub:"at step 1 (canonical)"},
        {l:"Subscribers",v:convStart,c:"#10B981",sub:`${convRate.toFixed(1)}% of total`},
        {l:"Signed up only",v:regStart,c:"#F59E0B",sub:`${totalStart>0?(regStart/totalStart*100).toFixed(1):0}%`},
        {l:"Not signed up",v:unregStart,c:"#EF4444",sub:`${totalStart>0?(unregStart/totalStart*100).toFixed(1):0}%`},
        {l:"Retention",v:`${totalStart>0?((allData[allData.length-1]?.totalEntities||0)/totalStart*100).toFixed(0):0}%`,c:"#A78BFA",sub:`step 1→${STEPS[STEPS.length-1].o}`}
      ].map(card=><div key={card.l} style={{background:"#FFFFFF",borderRadius:8,padding:"12px 14px",border:"1px solid #E2E8F0",boxShadow:"0 1px 2px rgba(15,23,42,0.04)"}}>
        <div style={{fontSize:10,color:"#64748B",fontWeight:600,textTransform:"uppercase",letterSpacing:".04em"}}>{card.l}</div>
        <div style={{fontSize:25,fontWeight:700,color:card.c,fontFamily:"monospace",marginTop:3}}>{card.v}</div>
        <div style={{fontSize:11,color:"#64748B"}}>{card.sub}</div>
      </div>)}
    </div>

    {/* Main content */}
    <div style={{padding:"0 20px 20px",display:"grid",gridTemplateColumns:sel!==null||mode==="conversion"?"320px 1fr":"320px 1fr",gap:14}}>
      {renderFunnel()}
      {renderDetail()}
    </div>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
